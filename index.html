<!DOCTYPE html>
<html>
<head>
    <title>ShopSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2 class="logo">ShopSphere 💜</h2>

    <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">

    <div>
        <a href="login.html" class="cart-btn">Login</a>
        <a href="cart.html" class="cart-btn">🛒 Cart</a>
    </div>
</div>

<div class="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('fashion')">Fashion</button>
    <button onclick="filterCategory('electronics')">Electronics</button>
</div>

<div class="banner">
    <h1>Welcome to ShopSphere 💙</h1>
    <p>Premium Shopping Experience</p>
</div>

<div id="products"></div>

<script src="script.js"></script>
</body>
</html>
