<!DOCTYPE html>
<html>
<head>
    <title>ShopSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2 class="logo">ShopSphere 💜</h2>

    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">

    <a href="cart.html" class="cart-btn">🛒 Cart</a>
</div>

<div class="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('fashion')">Fashion</button>
    <button onclick="filterCategory('electronics')">Electronics</button>
</div>

<div style="text-align:center; padding:15px;">
    <h2>Welcome to ShopSphere</h2>
    <p>Your one-stop shopping destination 💙</p>
</div>

<div id="products"></div>

<script src="script.js"></script>
</body>
</html>
